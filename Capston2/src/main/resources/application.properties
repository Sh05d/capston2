spring.application.name=Capston2

spring.datasource.url=jdbc:mysql://localhost:3308/hiraf_db

spring.datasource.username=root

spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


spring.jpa.show-sql=true

spring.jpa.generate-ddl=true


spring.jpa.hibernate.ddl-auto=create-drop

spring.web.error.include-message=always

spring.web.error.include-stacktrace=always


spring.mail.host=smtp.gmail.com

spring.mail.port=587

spring.mail.username=${mail}

spring.mail.password=${mailPassword}

spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true

twilio.account.sid=${twilloAccount}

twilio.auth.token=${twilloToken}

twilio.whatsapp.number=+14155238886

openai.api.key=${AI_API_key}